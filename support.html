<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>WallaHop – Support</title>
    <style>
        :root {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
        }
        body {
            max-width: 640px; margin: 2rem auto; padding: 0 1.5rem;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            transition: color 0.2s ease;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
            transition: background 0.2s ease;
        }
        body > * { position: relative; z-index: 1; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { margin: 0.5rem 0; }
        a:hover { text-decoration: underline; }
        @media (prefers-color-scheme: light) {
            body { color: #1a1a1a; background-image: url('bg-day.png'); }
            body::before { background: rgba(248, 249, 250, 0.42); }
            h1 { color: #0d0d0d; }
            a { color: #0071e3; }
        }
        @media (prefers-color-scheme: dark) {
            body { color: #e8e8ed; background-image: url('bg-night.png'); }
            body::before { background: rgba(28, 28, 30, 0.78); }
            h1 { color: #f5f5f7; }
            a { color: #5e9eff; }
        }
    </style>
</head>
<body>
    <p><img src="app-icon.png" alt="WallaHop" width="64" height="64" style="display: block; margin-bottom: 1rem;"></p>
    <h1>WallaHop – Support</h1>

    <p>No dedicated support is provided for this app.</p>

    <p>For general information about Wallabag and how to use the service, please visit:</p>
    <p><a href="https://wallabag.org" rel="noopener noreferrer">https://wallabag.org</a> (We are not affiliated with wallabag.org).</p>

    <p><a href="index.html">Privacy Policy</a></p>

    <p>© 2026 A. Duister. All rights reserved.</p>
</body>
</html>
